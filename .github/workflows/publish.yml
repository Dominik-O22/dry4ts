name: Publish

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write # OIDC trusted publishing + provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.6
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - run: npm install -g npm@latest # OIDC trusted publishing needs npm >= 11.5.1
      - run: bun install --frozen-lockfile
      - run: bun run ci
      - name: Verify tag matches package.json version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          pkg="$(node -p "require('./package.json').version")"
          if [ "$tag" != "$pkg" ]; then
            echo "Release tag ($tag) != package.json version ($pkg)" >&2
            exit 1
          fi
      # OIDC trusted publishing: no token, provenance is automatic under OIDC
      - run: npm publish --access public
